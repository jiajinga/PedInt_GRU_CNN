model_opts:
  model: MASK_PCPA_4_2D
  obs_input_type: [local_context_cnn, mask_cnn, pose, box, speed]  # 移除mask_cnn，避免慢速特征生成
  apply_class_weights: True
  normalize_boxes: True
  generator: True
net_opts:
  num_hidden_units: 256
  global_pooling: avg
  regularizer_val: 0.0001
  cell_type: gru
  backbone: vgg
exp_opts:
  datasets: [jaad_all]
  batch_size: [2, 2]
  epochs: [1, 1]  # 改为1个epoch快速测试，原来是[40,40]
  lr: [5.0e-07, 5.0e-07]